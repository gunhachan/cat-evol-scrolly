<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Visual Layout Website</title>
    <style>
        body {
            margin: 0 100px;
            /* Added padding-top and bottom so images don't touch the very edge of the browser */
            padding: 40px 0;
            /* Changed to a beige background color */
            background-color: #FDF5E7;
        }

        img {
            display: block;
            width: 100%;
            height: auto;
            /* Adds 40px of space below every image */
            margin-bottom: 40px;
        }

        /* Removes the margin from the very last image to keep the bottom spacing even */
        img:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
